                            </div>
                        </section>

                        {/* 03. 匯款核對區塊 */}
                        <section className="space-y-10 font-bold">
                            <div className="flex items-center gap-3 text-gray-900">
                                <div className="w-2 h-8 bg-blue-800 rounded-full font-bold text-gray-900"></div>
                                <h2 className="text-xl sm:text-2xl font-black tracking-tight underline decoration-blue-100 decoration-8 underline-offset-[-2px] flex items-center gap-2">
                                    <GlobeIcon /> 匯款與核對資訊
                                </h2>
                            </div>

                            <div className="border-4 border-blue-600 bg-blue-50 p-6 sm:p-8 rounded-3xl flex flex-col md:flex-row items-center justify-between gap-8 shadow-sm">
                                <div className="flex items-center gap-6 font-bold">
                                    <div className="bg-blue-600 p-4 rounded-2xl shadow-lg text-white hidden sm:block">
                                        <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
                                    </div>
                                    <div className="font-bold">
                                        <p className="text-xs sm:text-sm font-black text-blue-600 uppercase tracking-widest mb-1 allow-select">收款銀行：第一銀行 (007)</p>
                                        <p className="text-3xl sm:text-4xl font-mono font-black text-iglobe tracking-tighter allow-select">42210067066</p>
                                    </div>
                                </div>
                                <div className="text-center md:text-right space-y-3 font-bold">
                                    <p className="text-gray-900 font-black text-lg sm:text-xl">請匯款正確金額至收款帳戶</p>
                                    <p className="text-red-600 text-[11px] sm:text-sm font-black bg-red-50 px-4 sm:px-5 py-2 rounded-full border-2 border-red-100 inline-block">※ 滿 1000 元免運，離島未達免運需聯繫團主確認運費</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 sm:gap-10 pt-4 font-bold">
                                <div className="space-y-4 font-bold">
                                    <label className="text-lg sm:text-xl font-bold text-gray-800 block ml-1 uppercase font-bold">匯款總金額 *</label>
                                    <input type="number" name={FIELD_IDS.amount} required className="w-full px-5 sm:px-6 py-4 sm:py-5 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white transition-all text-2xl font-black text-blue-800 shadow-sm outline-none font-bold" placeholder="您的實匯金額" />
                                </div>
                                <div className="space-y-4 font-normal text-gray-600 text-blue-800 font-bold">
                                    <label className="text-lg sm:text-xl font-bold text-gray-800 block ml-1 uppercase font-bold">帳號末五碼 *</label>
                                    <input type="text" name={FIELD_IDS.bank5} required maxLength="5" className="w-full px-5 sm:px-6 py-4 sm:py-5 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white transition-all text-2xl font-black text-iglobe shadow-inner outline-none font-bold" placeholder="後 5 碼" />
                                </div>
                            </div>
                            <div className="space-y-4 font-normal text-gray-600 font-bold">
                                <label className="text-lg sm:text-xl font-bold text-gray-800 block ml-1 uppercase font-bold">匯款日期 *</label>
                                <input type="date" name={FIELD_IDS.date} required className="w-full px-6 py-5 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white transition-all text-2xl font-black shadow-sm outline-none font-bold" />
                            </div>
                            <div className="space-y-4 font-normal text-gray-600 text-gray-600 font-bold">
                                <label className="text-lg sm:text-xl font-bold text-gray-800 block ml-1 uppercase font-bold">其他備註 (如期望收貨日期)</label>
                                <textarea name={FIELD_IDS.memo} rows="2" className="w-full px-5 sm:px-6 py-4 sm:py-5 rounded-2xl border-2 border-gray-100 bg-gray-50 focus:bg-white transition-all text-xl font-normal shadow-sm outline-none font-normal" placeholder="選填"></textarea>
                            </div>
                        </section>

                        {/* 注意事項與常見問題 */}
                        <section className="space-y-6">
                            <div className="bg-amber-50 border-2 border-amber-100 p-8 sm:p-10 rounded-3xl text-gray-700 leading-relaxed shadow-sm font-bold">
                                <div className="flex items-center gap-3 mb-6 text-amber-800 font-black font-bold">
                                    <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span className="text-lg sm:text-xl font-bold uppercase tracking-wide font-bold">購買與售後條款說明</span>
                                </div>
                                <ul className="list-disc ml-6 space-y-4 text-sm sm:text-base md:text-lg font-normal text-gray-600">
                                    <li className="font-bold">購買享 <span className="underline decoration-amber-300 decoration-2 text-amber-900 font-bold">七天鑑賞期</span>，但鑑賞期非試用期。</li>
                                    <li>所有退回商品，包含包裝、發票、配件都須保持完整。</li>
                                    <li>商品需完整，拆封或使用後若非瑕疵，可能需負擔包裝費用。</li>
                                    <li className="leading-relaxed text-gray-700 font-normal sm:font-medium font-normal">
                                        若您所訂購之商品無問題而您欲退貨，退回的商品必須恢復原狀，包括主要商品、週邊配件，連同原包裝一併送回。→若無特殊理由（如瑕疵品）而辦理退換貨時，需同時負擔送貨及退貨所需之運費，此金額將自動於退款金額中扣除。有關退、換貨恢復原狀之規定，係依消費者保護法及民法之相關規定辦理。
                                    </li>
                                </ul>
                            </div>

                            <div className="bg-blue-50 border-2 border-blue-100 p-8 sm:p-10 rounded-3xl text-gray-700 leading-relaxed shadow-sm font-bold">
                                <div className="flex items-center gap-3 mb-6 text-blue-800 font-black font-bold font-bold font-bold">
                                    <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                    <span className="text-lg sm:text-xl font-bold uppercase tracking-wide font-bold">如我收到商品有缺件，應該如何處理?</span>
                                </div>
                                <div className="space-y-4 text-sm sm:text-base md:text-lg font-normal text-gray-700 font-normal font-normal">
                                    <p>在您收到訂購商品時，我們隨貨為您附上了<span className="font-bold text-blue-900 underline decoration-blue-200 decoration-2 font-bold font-bold">「商品出貨單」</span>，請您依表核對包裝箱內的商品內容。</p>
                                    <p className="leading-relaxed font-bold font-bold text-red-600">
                                        若有不符或短少，為確保您的權益，<span className="font-bold underline text-red-600 font-bold">請於 24 小時內與團主反應</span>，我們將為您作紀錄並進行處理。
                                    </p>
                                    <p className="italic text-gray-500 font-normal text-[11px] sm:text-sm font-normal">※「商品出貨單」為退換貨憑證之一，請妥善保管勿毀損丟棄。</p>
                                </div>
                            </div>
                        </section>

                        {/* Submit Button */}
                        <div className="pt-8 pb-12 font-bold font-bold">
                            <button 
                                type="submit" 
                                disabled={isLoading}
                                className={`w-full py-6 sm:py-8 rounded-2xl text-white font-black text-xl sm:text-2xl shadow-2xl btn-iglobe flex items-center justify-center gap-4 transition-all transform active:scale-95 font-black ${isLoading ? 'opacity-70 cursor-not-allowed' : ''}`}
                            >
                                {isLoading ? (
                                    <svg className="animate-spin h-10 w-10 text-white" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                                ) : "已正確填寫、同意說明並送出"}
                            </button>
                        </div>
                    </form>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
